---
- name: "Discover BCM head node configuration"
  hosts: localhost
  gather_facts: true
  vars_prompt:
    - name: bcm_host
      prompt: "BCM head node IP or hostname"
      private: false

    - name: bcm_port
      prompt: "SSH port (default 22)"
      default: "22"
      private: false

    - name: bcm_user
      prompt: "SSH user (default root)"
      default: "root"
      private: false

    - name: bcm_pass
      prompt: "SSH password"
      private: true

  vars:
    e2e_dir: "{{ lookup('env', 'E2E_DIR') | default(playbook_dir + '/..', true) }}"
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=10"
    ssh_cmd: "sshpass -p '{{ bcm_pass }}' ssh {{ ssh_opts }} -p {{ bcm_port }} {{ bcm_user }}@{{ bcm_host }}"

  tasks:
    - name: Verify SSH connectivity
      ansible.builtin.shell: "{{ ssh_cmd }} 'echo OK' 2>/dev/null | tail -1 | tr -d '[:space:]'"
      args:
        executable: /bin/bash
      register: ssh_test
      failed_when: ssh_test.stdout != 'OK'
      changed_when: false

    - name: Gather BCM configuration
      ansible.builtin.shell: |
        #!/bin/bash
        {{ ssh_cmd }} 'bash -s' << 'REMOTE' 2>/dev/null
        echo "BCM_VERSION=$(dpkg -l cm-config 2>/dev/null | awk "/cm-config/{print \$3}" || echo unknown)"
        echo "BCM_HOSTNAME=$(hostname)"

        # Network — try eth then ens naming
        get_ip() { ip -4 -o addr show "$1" 2>/dev/null | awk '{print $4}' | cut -d/ -f1; }
        get_mask() { ip -4 -o addr show "$1" 2>/dev/null | awk '{print $4}' | cut -d/ -f2; }
        ETH0_IP=$(get_ip eth0); [ -z "$ETH0_IP" ] && ETH0_IP=$(get_ip ens18)
        ETH0_MASK=$(get_mask eth0); [ -z "$ETH0_MASK" ] && ETH0_MASK=$(get_mask ens18)
        ETH1_IP=$(get_ip eth1); [ -z "$ETH1_IP" ] && ETH1_IP=$(get_ip ens19)
        ETH1_MASK=$(get_mask eth1); [ -z "$ETH1_MASK" ] && ETH1_MASK=$(get_mask ens19)
        echo "ETH0_IP=$ETH0_IP"
        echo "ETH0_MASK=$ETH0_MASK"
        echo "ETH1_IP=$ETH1_IP"
        echo "ETH1_MASK=$ETH1_MASK"

        # CIDR
        if [ -n "$ETH0_IP" ] && [ -n "$ETH0_MASK" ]; then
          IFS='.' read -r a b c d <<< "$ETH0_IP"
          if [ "$ETH0_MASK" -ge 24 ]; then CIDR="${a}.${b}.${c}.0/${ETH0_MASK}"
          elif [ "$ETH0_MASK" -ge 16 ]; then CIDR="${a}.${b}.0.0/${ETH0_MASK}"
          else CIDR="${a}.0.0.0/${ETH0_MASK}"; fi
          echo "INTERNAL_CIDR=$CIDR"
        else
          echo "INTERNAL_CIDR=unknown"
        fi

        echo "GATEWAY=$(ip route show default 2>/dev/null | grep -oP 'via \K[0-9.]+' | head -1)"
        echo "DNS=$(grep nameserver /etc/resolv.conf 2>/dev/null | head -1 | awk '{print $2}')"
        echo "CMSH_DNS=$(cmsh -c 'partition; use base; get nameservers' 2>/dev/null | grep -oP '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -1)"

        echo "CMD_STATUS=$(systemctl is-active cmd 2>/dev/null)"
        echo "DHCPD_STATUS=$(systemctl is-active dhcpd 2>/dev/null)"
        echo "NAMED_STATUS=$(systemctl is-active named 2>/dev/null)"
        echo "NFS_STATUS=$(systemctl is-active nfs-server 2>/dev/null)"

        echo "CATEGORIES=$(cmsh -c 'category; list' 2>/dev/null | awk 'NR>1 && NF>1{print $2}' | tr '\n' ',' | sed 's/,$//')"
        echo "NODES=$(cmsh -c 'device; list' 2>/dev/null | grep -i node | awk '{printf "%s(MAC:%s,IP:%s,cat:%s) ", $2, $3, $5, $4}')"
        echo "KERNEL=$(ls /cm/images/default-image/boot/vmlinuz-* 2>/dev/null | head -1 | sed 's|.*/vmlinuz-||')"
        echo "SHARED_FREE=$(df -h /cm/shared 2>/dev/null | tail -1 | awk '{print $4}')"
        echo "IP_FWD=$(cat /proc/sys/net/ipv4/ip_forward 2>/dev/null)"
        REMOTE
      args:
        executable: /bin/bash
      register: discovery_raw
      changed_when: false

    - name: Filter discovery output
      ansible.builtin.set_fact:
        discovery_lines: "{{ discovery_raw.stdout_lines | map('trim') | select('match', '^[A-Z0-9_]+=') | list }}"

    - name: Parse discovery results
      ansible.builtin.set_fact:
        disc: "{{ disc | default({}) | combine({item.split('=', 1)[0] | trim: item.split('=', 1)[1] | trim}) }}"
      loop: "{{ discovery_lines }}"
      when: "'=' in item"

    - name: Generate group_vars recommendations
      ansible.builtin.set_fact:
        recommended_vars: |
          # ---- Discovered BCM Configuration ----
          # BCM: {{ disc.BCM_HOSTNAME | default('unknown') }} ({{ disc.BCM_VERSION | default('unknown') }})
          # Discovered: {{ ansible_facts.date_time.iso8601 }}

          # --- BCM Head Node ---
          bcm_password: "{{ bcm_pass }}"
          bcm_hostname: "{{ disc.BCM_HOSTNAME | default('bcm-headnode') }}"

          # BCM networking (internal provisioning)
          bcm_internal_ip: "{{ disc.ETH0_IP | default('NEEDS_MANUAL_CONFIG') }}"
          bcm_internal_netmask: "{{ disc.ETH0_MASK | default('24') }}"
          bcm_internal_cidr: "{{ disc.INTERNAL_CIDR | default('NEEDS_MANUAL_CONFIG') }}"

          # BCM external
          bcm_external_gateway: "{{ disc.GATEWAY | default('NEEDS_MANUAL_CONFIG') }}"
          bcm_external_dns: "{{ disc.CMSH_DNS | default(disc.DNS) | default('NEEDS_MANUAL_CONFIG') }}"

          # BCM connection (for deploy-dd SSH)
          bcm_connect_ip: "{{ bcm_host }}"
          bcm_connect_port: "{{ bcm_port }}"

          # --- Kairos Build ---
          kairos_kernel_version: "{{ disc.KERNEL | default('NEEDS_MANUAL_CONFIG') }}"

    - name: Display discovery results
      vars:
        report: |-

          ============================================
           BCM Discovery Results
          ============================================

          Host:           {{ bcm_host }}:{{ bcm_port }}
          Hostname:       {{ disc.BCM_HOSTNAME | default('unknown') }}
          Version:        {{ disc.BCM_VERSION | default('unknown') }}

          -- Network --
          eth0 (internal):  {{ disc.ETH0_IP | default('N/A') }}/{{ disc.ETH0_MASK | default('N/A') }}
          eth1 (external):  {{ disc.ETH1_IP | default('N/A') }}/{{ disc.ETH1_MASK | default('N/A') }}
          Internal CIDR:    {{ disc.INTERNAL_CIDR | default('N/A') }}
          Gateway:          {{ disc.GATEWAY | default('N/A') }}
          DNS:              {{ disc.DNS | default('N/A') }}
          cmsh DNS:         {{ disc.CMSH_DNS | default('N/A') }}
          IP forwarding:    {{ disc.IP_FWD | default('N/A') }}

          -- Services --
          cmd:              {{ disc.CMD_STATUS | default('N/A') }}
          dhcpd:            {{ disc.DHCPD_STATUS | default('N/A') }}
          named:            {{ disc.NAMED_STATUS | default('N/A') }}
          nfs-server:       {{ disc.NFS_STATUS | default('N/A') }}

          -- Cluster --
          Categories:       {{ disc.CATEGORIES | default('none') }}
          Nodes:            {{ disc.NODES | default('none') }}
          Kernel:           {{ disc.KERNEL | default('N/A') }}
          /cm/shared free:  {{ disc.SHARED_FREE | default('N/A') }}

          ============================================
           Recommended group_vars/all values
          ============================================

          {{ recommended_vars }}
      ansible.builtin.debug:
        msg: "{{ report.split('\n') }}"

    - name: Save discovery to file
      ansible.builtin.copy:
        content: |
          # BCM Discovery — {{ bcm_host }}:{{ bcm_port }}
          # Discovered: {{ ansible_facts.date_time.iso8601 }}
          #
          # Copy the values below into inventory/group_vars/all
          # Review and adjust before running deploy-dd

          {{ recommended_vars }}
          # --- Status at discovery time ---
          # cmd: {{ disc.CMD_STATUS | default('N/A') }}
          # dhcpd: {{ disc.DHCPD_STATUS | default('N/A') }}
          # named: {{ disc.NAMED_STATUS | default('N/A') }}
          # nfs-server: {{ disc.NFS_STATUS | default('N/A') }}
          # Categories: {{ disc.CATEGORIES | default('none') }}
          # Nodes: {{ disc.NODES | default('none') }}
          # /cm/shared free: {{ disc.SHARED_FREE | default('N/A') }}
        dest: "{{ e2e_dir }}/bcm-discovery-{{ bcm_host }}.yml"
      changed_when: false

    - name: Discovery saved
      ansible.builtin.debug:
        msg: "Saved to {{ e2e_dir }}/bcm-discovery-{{ bcm_host }}.yml"
