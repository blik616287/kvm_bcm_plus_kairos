---
- name: "Discover BCM head node configuration"
  hosts: localhost
  gather_facts: true
  vars_prompt:
    - name: bcm_host
      prompt: "BCM head node IP or hostname (reachable directly or via proxy)"
      private: false

    - name: bcm_port
      prompt: "SSH port (default 22)"
      default: "22"
      private: false

    - name: bcm_user
      prompt: "SSH user (default root)"
      default: "root"
      private: false

    - name: bcm_pass
      prompt: "SSH password"
      private: true

    - name: bcm_proxy_jump
      prompt: "Jumphost in user@host form (blank if BCM is directly reachable)"
      default: ""
      private: false

    - name: bcm_proxy_key
      prompt: "Jumphost SSH key (blank if no jumphost; ~ OK)"
      default: ""
      private: false

  vars:
    e2e_dir: "{{ lookup('env', 'E2E_DIR') | default(playbook_dir + '/..', true) }}"
    ssh_config_path: "{{ e2e_dir }}/.discover-ssh-config"
    # Defined at play-vars scope so {{ ssh_cmd }} is available at task-load time
    # (Ansible pre-parses templating; set_fact values aren't).
    ssh_cmd: "sshpass -p '{{ bcm_pass }}' ssh -F {{ ssh_config_path }} bcm-discover"

  tasks:
    - name: Build per-run SSH config (with optional jumphost ProxyCommand)
      ansible.builtin.copy:
        dest: "{{ ssh_config_path }}"
        mode: "0600"
        content: |
          Host bcm-discover
              HostName {{ bcm_host }}
              Port {{ bcm_port }}
              User {{ bcm_user }}
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              LogLevel ERROR
              ConnectTimeout 10
          {% if bcm_proxy_jump | length > 0 %}    ProxyCommand ssh -i {{ bcm_proxy_key | regex_replace('^~', lookup('env', 'HOME')) }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -W %h:%p {{ bcm_proxy_jump }}
          {% endif %}

    - name: Verify SSH connectivity
      ansible.builtin.shell: "{{ ssh_cmd }} 'echo OK' 2>/dev/null | tail -1 | tr -d '[:space:]'"
      args:
        executable: /bin/bash
      register: ssh_test
      failed_when: ssh_test.stdout != 'OK'
      changed_when: false

    - name: Gather BCM configuration
      # `cmd:` (rather than shorthand) avoids Ansible's module-arg parser
      # trying to split my VAR=value lines as if they were task keyword args.
      ansible.builtin.shell:
        cmd: |
          #!/bin/bash
          {{ ssh_cmd }} 'bash -s' << 'REMOTE' 2>/dev/null
          echo "BCM_VERSION=$(dpkg -l cm-config 2>/dev/null | awk "/cm-config/{print \$3}" || echo unknown)"
          echo "BCM_HOSTNAME=$(hostname)"

          # --- Internal-network discovery via cmsh (authoritative) ---
          # Find the network flagged as "Internal" type, read its baseaddress + netmaskbits.
          INTNET_NAME=$(cmsh -c 'network; list' 2>/dev/null \
              | awk 'tolower($2)=="internal" {print $1; exit}')
          if [ -n "$INTNET_NAME" ]; then
              INTNET_BASE=$(cmsh -c "network; use $INTNET_NAME; get baseaddress" 2>/dev/null \
                  | tr -d '[:space:]')
              INTNET_BITS=$(cmsh -c "network; use $INTNET_NAME; get netmaskbits" 2>/dev/null \
                  | tr -d '[:space:]')
              INTERNAL_CIDR="${INTNET_BASE}/${INTNET_BITS}"
          else
              INTERNAL_CIDR="unknown"
          fi
          echo "INTERNAL_CIDR=$INTERNAL_CIDR"
          echo "INTERNAL_NETMASK=$INTNET_BITS"

          # Find which host interface holds an IP inside that CIDR — not by NIC name.
          if [ -n "$INTNET_BASE" ] && [ -n "$INTNET_BITS" ]; then
              NET_PREFIX=${INTNET_BASE%.*}   # assumes /24 or wider; first 3 octets
              INTERNAL_IP=$(ip -4 -o addr 2>/dev/null \
                  | awk -v p="$NET_PREFIX" '$4 ~ "^"p {split($4,a,"/"); print a[1]; exit}')
              INTERNAL_IF=$(ip -4 -o addr 2>/dev/null \
                  | awk -v p="$NET_PREFIX" '$4 ~ "^"p {print $2; exit}')
          fi
          echo "INTERNAL_IP=$INTERNAL_IP"
          echo "INTERNAL_IF=$INTERNAL_IF"

          # External: default-route interface + its IP
          EXT_IF=$(ip -o route 2>/dev/null | awk '/^default/{print $5; exit}')
          EXT_IP=$(ip -4 -o addr show dev "$EXT_IF" 2>/dev/null | awk '{split($4,a,"/"); print a[1]}' | head -1)
          echo "EXT_IF=$EXT_IF"
          echo "EXT_IP=$EXT_IP"

          echo "GATEWAY=$(ip route show default 2>/dev/null | awk '/^default/{print $3; exit}')"
          echo "DNS=$(grep ^nameserver /etc/resolv.conf 2>/dev/null | head -1 | awk '{print $2}')"
          echo "CMSH_DNS=$(cmsh -c 'partition; use base; get nameservers' 2>/dev/null \
              | grep -oP '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -1)"

          echo "CMD_STATUS=$(systemctl is-active cmd 2>/dev/null)"
          echo "DHCPD_STATUS=$(systemctl is-active dhcpd 2>/dev/null)"
          echo "NAMED_STATUS=$(systemctl is-active named 2>/dev/null)"
          echo "NFS_STATUS=$(systemctl is-active nfs-server 2>/dev/null)"

          # --- Structured cmsh output via per-object `get` calls ---
          # cmsh's column-aligned `list` can't be awk-parsed safely because category
          # names contain whitespace (e.g. "S-AI Partner Lab"). Per-field get is slow
          # but reliable. Each line below uses '|' as the between-field separator.

          # Names don't contain whitespace on BCM, so first `list` column is safe to awk.
          # But CATEGORY/IMAGE names (second column and beyond) can contain spaces —
          # for those we take only the first whitespace-separated token per data row.
          # `cmsh ... list -f name` returns one Name per line with no header,
          # whitespace-padded to column width. Strip trailing whitespace per line.
          echo "---BEGIN_CATEGORIES---"
          cmsh -c 'category; list -f name' 2>/dev/null \
              | sed 's/[[:space:]]*$//' | awk 'NF>0 {print}'
          echo "---END_CATEGORIES---"

          echo "---BEGIN_IMAGES---"
          cmsh -c 'softwareimage; list -f name' 2>/dev/null \
              | sed 's/[[:space:]]*$//' | awk 'NF>0 {print}'
          echo "---END_IMAGES---"

          echo "---BEGIN_NODES---"
          # Filter device rows by type (col 1 = PhysicalNode/HeadNode), take col 2 = name.
          # Per-device get calls so category names with spaces survive. Strip cmsh "help"
          # fallback text (happens for HeadNode which has no category/softwareimage) by
          # requiring the value to be a single short token.
          sanitize() {
              local v
              v=$(cat | tr -d '\n' | sed 's/^ *//; s/ *$//')
              case "$v" in
                  *"Name:"*|*"Usage:"*|*"Arguments:"*) echo "" ;;
                  *) echo "$v" ;;
              esac
          }
          cmsh -c 'device; list' 2>/dev/null \
              | awk '$1 ~ /^PhysicalNode|^HeadNode$/ {print $2}' \
              | while read -r dev; do
                  [ -z "$dev" ] && continue
                  mac=$(cmsh -c "device; use ${dev}; get mac"  2>/dev/null | sanitize)
                  ip=$(cmsh  -c "device; use ${dev}; get ip"   2>/dev/null | sanitize)
                  cat=$(cmsh -c "device; use ${dev}; get category" 2>/dev/null | sanitize)
                  im=$(cmsh  -c "device; use ${dev}; get softwareimage" 2>/dev/null | sanitize)
                  echo "${dev}|${mac}|${ip}|${cat}|${im}"
              done
          echo "---END_NODES---"

          echo "KERNEL=$(ls /cm/images/default-image/boot/vmlinuz-* 2>/dev/null | head -1 | sed 's|.*/vmlinuz-||')"
          echo "SHARED_FREE=$(df -h /cm/shared 2>/dev/null | tail -1 | awk '{print $4}')"
          echo "IP_FWD=$(cat /proc/sys/net/ipv4/ip_forward 2>/dev/null)"
          REMOTE
      args:
        executable: /bin/bash
      register: discovery_raw
      changed_when: false

    - name: Extract key=value lines
      ansible.builtin.set_fact:
        discovery_lines: "{{ discovery_raw.stdout_lines | map('trim') | select('match', '^[A-Z_][A-Z0-9_]*=') | list }}"

    - name: Parse key=value into dict
      ansible.builtin.set_fact:
        disc: "{{ disc | default({}) | combine({item.split('=', 1)[0] | trim: item.split('=', 1)[1] | trim}) }}"
      loop: "{{ discovery_lines }}"
      when: "'=' in item"

    - name: Parse cmsh blocks (categories, nodes, images)
      ansible.builtin.set_fact:
        categories_list: "{{ (discovery_raw.stdout.split('---BEGIN_CATEGORIES---')[1].split('---END_CATEGORIES---')[0] | trim).split('\n') | select | list }}"
        nodes_raw_list:  "{{ (discovery_raw.stdout.split('---BEGIN_NODES---')[1].split('---END_NODES---')[0] | trim).split('\n') | select | list }}"
        images_list:     "{{ (discovery_raw.stdout.split('---BEGIN_IMAGES---')[1].split('---END_IMAGES---')[0] | trim).split('\n') | select | list }}"

    - name: Parse each node line into a record (name|mac|ip|category|image)
      ansible.builtin.set_fact:
        nodes_list: >-
          {{
            nodes_raw_list
            | map('split', '|')
            | map('map', 'trim')
            | selectattr('0', 'defined')
            | list
          }}

    - name: Determine output filename (BCM's own hostname, not the user-supplied host)
      ansible.builtin.set_fact:
        discovery_filename: "{{ e2e_dir }}/bcm-discovery-{{ disc.BCM_HOSTNAME | default(bcm_host) | regex_replace('[^A-Za-z0-9._-]', '_') }}.yml"

    - name: Generate group_vars recommendations
      ansible.builtin.set_fact:
        recommended_vars: |
          # ---- Discovered BCM Configuration ----
          # BCM: {{ disc.BCM_HOSTNAME | default('unknown') }} ({{ disc.BCM_VERSION | default('unknown') }})
          # Discovered: {{ ansible_facts.date_time.iso8601 }}

          # --- BCM Head Node ---
          bcm_password: "{{ bcm_pass }}"
          bcm_hostname: "{{ disc.BCM_HOSTNAME | default('bcm-headnode') }}"

          # BCM provisioning network (from cmsh network;internalnet)
          bcm_internal_ip:      "{{ disc.INTERNAL_IP | default('NEEDS_MANUAL_CONFIG') }}"
          bcm_internal_netmask: "{{ disc.INTERNAL_NETMASK | default('24') }}"
          bcm_internal_cidr:    "{{ disc.INTERNAL_CIDR | default('NEEDS_MANUAL_CONFIG') }}"
          # (BCM presents the internal IP on interface: {{ disc.INTERNAL_IF | default('?') }})

          # BCM external routing
          bcm_external_gateway: "{{ disc.GATEWAY | default('NEEDS_MANUAL_CONFIG') }}"
          bcm_external_dns:     "{{ disc.CMSH_DNS | default(disc.DNS) | default('NEEDS_MANUAL_CONFIG') }}"
          # External iface: {{ disc.EXT_IF | default('?') }}  IP: {{ disc.EXT_IP | default('?') }}

          # SSH transport (how we reached this BCM)
          bcm_ssh_host:        "{{ bcm_host }}"
          bcm_ssh_port:        {{ bcm_port }}
          bcm_ssh_proxy_jump:  "{{ bcm_proxy_jump }}"
          bcm_ssh_proxy_key:   "{{ bcm_proxy_key }}"

          # Safe defaults for a remote (existing) BCM
          bcm_manage_dns:              false
          bcm_manage_cluster_defaults: false

          # --- Kairos Build ---
          kairos_kernel_version: "{{ disc.KERNEL | default('NEEDS_MANUAL_CONFIG') }}"

    - name: Display discovery results
      vars:
        node_header: "NAME | MAC | IP | CATEGORY | SOFTWAREIMAGE"
        report: |-

          ============================================
           BCM Discovery Results
          ============================================

          Reached via:     {{ bcm_host }}:{{ bcm_port }}{% if bcm_proxy_jump | length > 0 %} (proxy: {{ bcm_proxy_jump }}){% endif %}

          Hostname:        {{ disc.BCM_HOSTNAME | default('unknown') }}
          Version:         {{ disc.BCM_VERSION | default('unknown') }}

          -- Network --
          Internal iface:  {{ disc.INTERNAL_IF | default('N/A') }} = {{ disc.INTERNAL_IP | default('N/A') }}/{{ disc.INTERNAL_NETMASK | default('N/A') }}
          External iface:  {{ disc.EXT_IF | default('N/A') }} = {{ disc.EXT_IP | default('N/A') }}
          CIDR:            {{ disc.INTERNAL_CIDR | default('N/A') }}
          Gateway:         {{ disc.GATEWAY | default('N/A') }}
          DNS (resolv.conf): {{ disc.DNS | default('N/A') }}
          DNS (cmsh):        {{ disc.CMSH_DNS | default('N/A') }}
          IP forwarding:   {{ disc.IP_FWD | default('N/A') }}

          -- Services --
          cmd:             {{ disc.CMD_STATUS | default('N/A') }}
          dhcpd:           {{ disc.DHCPD_STATUS | default('N/A') }}
          named:           {{ disc.NAMED_STATUS | default('N/A') }}
          nfs-server:      {{ disc.NFS_STATUS | default('N/A') }}

          -- Cluster --
          Categories:      {{ categories_list | join(', ') }}
          Software images: {{ images_list | join(', ') }}
          Nodes ({{ node_header }}):
          {% for n in nodes_list %}
            - {{ n | join(' | ') }}
          {% endfor %}
          Kernel:          {{ disc.KERNEL | default('N/A') }}
          /cm/shared free: {{ disc.SHARED_FREE | default('N/A') }}

          ============================================
           Recommended group_vars values
          ============================================

          {{ recommended_vars }}
      ansible.builtin.debug:
        msg: "{{ report.split('\n') }}"

    - name: Save discovery to file
      ansible.builtin.copy:
        content: |
          # BCM Discovery — {{ disc.BCM_HOSTNAME | default(bcm_host) }}
          # Reached: {{ bcm_host }}:{{ bcm_port }}{% if bcm_proxy_jump | length > 0 %} via {{ bcm_proxy_jump }}{% endif %}

          # Discovered: {{ ansible_facts.date_time.iso8601 }}
          #
          # Copy the values below into inventory/group_vars/all.yml
          # Review and adjust before running deploy-dd

          {{ recommended_vars }}

          # --- Cluster state at discovery time ---
          # Services:
          #   cmd:        {{ disc.CMD_STATUS | default('N/A') }}
          #   dhcpd:      {{ disc.DHCPD_STATUS | default('N/A') }}
          #   named:      {{ disc.NAMED_STATUS | default('N/A') }}
          #   nfs-server: {{ disc.NFS_STATUS | default('N/A') }}
          # Categories ({{ categories_list | length }}): {{ categories_list | join(', ') }}
          # Images ({{ images_list | length }}): {{ images_list | join(', ') }}
          # Nodes ({{ nodes_list | length }}):
          {% for n in nodes_list %}
          #   {{ n | join(' | ') }}
          {% endfor %}
          # /cm/shared free: {{ disc.SHARED_FREE | default('N/A') }}
        dest: "{{ discovery_filename }}"
      changed_when: false

    - name: Clean up SSH config
      ansible.builtin.file:
        path: "{{ ssh_config_path }}"
        state: absent
      changed_when: false

    - name: Discovery saved
      ansible.builtin.debug:
        msg: "Saved to {{ discovery_filename }}"
