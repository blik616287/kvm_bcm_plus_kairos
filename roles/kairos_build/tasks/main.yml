---
# kairos_build — Build Kairos ISO via CanvOS + generate raw disk image via local QEMU.
# Uses SeaBIOS for BIOS+EFI bootable image. Patches squashfs for stable NIC naming.

- name: Capture invoking user (ansible.cfg has become=true, so most tasks run as root;
        we need the original user to chown artifacts back at the end)
  ansible.builtin.command: whoami
  register: invoking_user
  become: false
  changed_when: false

- name: Set CanvOS variables
  ansible.builtin.set_fact:
    canvos_dir: "{{ e2e_dir }}/CanvOS"
    iso_name: "palette-edge-installer"
    os_distribution: "ubuntu"
    os_version: "22.04"
    k8s_distribution: "k3s"
    custom_tag: "bcm-test"
    arch: "amd64"

# ---- Clone CanvOS if missing ----

- name: Check if CanvOS exists
  ansible.builtin.stat:
    path: "{{ canvos_dir }}/.git"
  register: canvos_stat

- name: Clone CanvOS
  ansible.builtin.git:
    repo: https://github.com/spectrocloud/CanvOS.git
    dest: "{{ canvos_dir }}"
  when: not canvos_stat.stat.exists

# ---- Build Kairos ISO ----

- name: Ensure build directory exists
  ansible.builtin.file:
    path: "{{ build_dir }}"
    state: directory
    mode: "0755"

- name: Check if Kairos ISO exists
  ansible.builtin.stat:
    path: "{{ build_dir }}/{{ iso_name }}.iso"
  register: kairos_iso_stat

- name: Build Kairos ISO
  when: not kairos_iso_stat.stat.exists
  block:
    - name: Generate .arg file
      ansible.builtin.template:
        src: "{{ e2e_dir }}/files/canvos/.arg.template"
        dest: "{{ canvos_dir }}/.arg"
      vars:
        CUSTOM_TAG: "{{ custom_tag }}"
        IMAGE_REGISTRY: "{{ kairos_container_registry }}"
        OS_DISTRIBUTION: "{{ os_distribution }}"
        OS_VERSION: "{{ os_version }}"
        K8S_DISTRIBUTION: "{{ k8s_distribution }}"
        ISO_NAME: "{{ iso_name }}"
        ARCH: "{{ arch }}"

    - name: Copy overlay files into CanvOS
      ansible.builtin.shell: cp -rp {{ e2e_dir }}/files/canvos/overlay/* {{ canvos_dir }}/overlay/ 2>/dev/null || true

    - name: Ensure overlay scripts are executable
      ansible.builtin.file:
        path: "{{ item }}"
        mode: "0755"
      loop:
        - "{{ canvos_dir }}/overlay/files/usr/bin/bcm-compat-fixes.sh"
        - "{{ canvos_dir }}/overlay/files/usr/bin/bcm-sync-userdata.sh"
      failed_when: false

    - name: Patch Earthfile — add BCM packages
      ansible.builtin.replace:
        path: "{{ canvos_dir }}/Earthfile"
        regexp: 'apt-get install --no-install-recommends kbd'
        replace: 'apt-get install --no-install-recommends wget ifupdown nfs-common kbd'

    - name: Patch Earthfile — skip dracut nfit
      ansible.builtin.lineinfile:
        path: "{{ canvos_dir }}/Earthfile"
        insertafter: 'IF \[ "\$FIPS_ENABLED" = "false" \]'
        line: "                RUN echo 'omit_dracutmodules+=\" nfit \"' > /etc/dracut.conf.d/99-skip-nfit.conf"
      failed_when: false

    - name: Patch Dockerfile — add BCM scripts (COPY + chmod +x as real Dockerfile instructions)
      ansible.builtin.blockinfile:
        path: "{{ canvos_dir }}/Dockerfile"
        insertafter: 'Add any other image customizations here'
        marker: "# {mark} BCM compat scripts"
        block: |
          COPY overlay/files/usr/bin/bcm-compat-fixes.sh /usr/bin/bcm-compat-fixes.sh
          COPY overlay/files/usr/bin/bcm-sync-userdata.sh /usr/bin/bcm-sync-userdata.sh
          RUN chmod +x /usr/bin/bcm-compat-fixes.sh /usr/bin/bcm-sync-userdata.sh

    - name: Run CanvOS build
      ansible.builtin.shell: |
        cd {{ canvos_dir }}
        ./earthly.sh +iso --ARCH={{ arch }}
      async: 3600
      poll: 30

    - name: Copy ISO to build directory
      ansible.builtin.copy:
        src: "{{ canvos_dir }}/build/{{ iso_name }}.iso"
        dest: "{{ build_dir }}/{{ iso_name }}.iso"
        remote_src: true

# ---- Generate raw disk image ----

- name: Check if raw disk exists
  ansible.builtin.stat:
    path: "{{ build_dir }}/kairos-disk.raw"
  register: raw_disk_stat

- name: Generate raw disk image via QEMU
  when: not raw_disk_stat.stat.exists
  block:
    - name: Generate BCM SSH key pair if missing
      ansible.builtin.shell: |
        if [ ! -f {{ build_dir }}/bcm-kairos-key ]; then
          ssh-keygen -t ed25519 -f {{ build_dir }}/bcm-kairos-key -N "" -C "kairos-node@bcm" -q
          echo "generated"
        else
          echo "exists"
        fi
      register: bcm_key_gen

    - name: Read BCM SSH key
      ansible.builtin.slurp:
        src: "{{ build_dir }}/bcm-kairos-key"
      register: bcm_key_file

    - name: Set BCM SSH key content
      ansible.builtin.set_fact:
        bcm_ssh_key_content: "{{ bcm_key_file.content | b64decode }}"

    - name: Render cloud-config
      ansible.builtin.template:
        src: cloud-config.yaml.j2
        dest: "{{ build_dir }}/cloud-config.yaml"
        mode: "0644"

    - name: Create user-data FAT32 image
      ansible.builtin.shell: |
        dd if=/dev/zero of={{ build_dir }}/userdata.img bs=1M count=4 status=none
        mkfs.vfat -n CIDATA {{ build_dir }}/userdata.img >/dev/null
        mcopy -i {{ build_dir }}/userdata.img {{ build_dir }}/cloud-config.yaml "::user-data"

    - name: Create blank raw disk
      ansible.builtin.shell: truncate -s 81920M {{ build_dir }}/kairos-disk.raw

    # OVMF (UEFI) so kairos-agent detects UEFI and installs GRUB-EFI into an ESP.
    # The resulting raw image is bootable on UEFI hardware (physical Dell servers etc.).
    # BIOS-only platforms would need a separate image built with SeaBIOS.
    - name: Run kairos-agent install in QEMU (OVMF / UEFI)
      ansible.builtin.shell: |
        SOCK="{{ build_dir }}/.qemu-install.sock"
        rm -f "$SOCK"
        OVMF_CODE=/usr/share/OVMF/OVMF_CODE_4M.fd
        OVMF_VARS_SRC=/usr/share/OVMF/OVMF_VARS_4M.fd
        [ -f "$OVMF_CODE" ] || OVMF_CODE=/usr/share/qemu/OVMF.fd
        [ -f "$OVMF_VARS_SRC" ] || OVMF_VARS_SRC=/usr/share/ovmf/OVMF.fd
        cp -f "$OVMF_VARS_SRC" {{ build_dir }}/ovmf-vars.fd
        qemu-system-x86_64 \
          -enable-kvm -m 4096 -smp 2 -cpu host \
          -machine q35 \
          -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
          -drive if=pflash,format=raw,file={{ build_dir }}/ovmf-vars.fd \
          -display none \
          -chardev socket,id=ser0,path="$SOCK",server=on,wait=off \
          -serial chardev:ser0 \
          -drive if=virtio,format=raw,media=disk,file={{ build_dir }}/kairos-disk.raw \
          -drive if=virtio,format=raw,readonly=on,file={{ build_dir }}/userdata.img \
          -drive format=raw,media=cdrom,readonly=on,file={{ build_dir }}/{{ iso_name }}.iso \
          -boot d \
          -pidfile {{ build_dir }}/.qemu-install.pid \
          -daemonize
        QEMU_PID=$(cat {{ build_dir }}/.qemu-install.pid)
        sleep 90
        (
          sleep 2
          printf 'mount /dev/vdb /mnt 2>/dev/null && cp /mnt/user-data /oem/90_custom.yaml && cp /mnt/user-data /tmp/99_bcm.yaml\r\n'
          sleep 3
          printf 'kairos-agent --debug install 2>&1; mount /dev/vda2 /oem 2>/dev/null; cp /tmp/99_bcm.yaml /oem/99_bcm.yaml; poweroff\r\n'
          sleep 600
        ) | nc -U "$SOCK" > {{ e2e_dir }}/logs/qemu-install.log 2>&1 &
        SERIAL_PID=$!
        while kill -0 "$QEMU_PID" 2>/dev/null; do sleep 10; done
        kill "$SERIAL_PID" 2>/dev/null || true
        rm -f "$SOCK" {{ build_dir }}/.qemu-install.pid {{ build_dir }}/userdata.img
      async: 3600
      poll: 30

    - name: Fix ext4 metadata_csum for GRUB compatibility
      ansible.builtin.shell: |
        LOOP=$(losetup -fP --show {{ build_dir }}/kairos-disk.raw)
        for p in ${LOOP}p2 ${LOOP}p3 ${LOOP}p4 ${LOOP}p5; do
          [ -b "$p" ] || continue
          e2fsck -fy "$p" >/dev/null 2>&1
          tune2fs -O ^metadata_csum "$p" 2>/dev/null && echo "Fixed: $p"
        done
        losetup -d "$LOOP"
      become: true

    - name: Patch bootargs and network config for stable interface naming
      ansible.builtin.shell: |
        LOOP=$(losetup -fP --show {{ build_dir }}/kairos-disk.raw)
        mkdir -p /tmp/kairos-patch-state /tmp/kairos-patch-img
        for part_label in p4:cOS/active.img p4:cOS/passive.img p3:cOS/recovery.img; do
          PART="${LOOP}${part_label%%:*}"
          IMG="${part_label#*:}"
          [ -b "$PART" ] || continue
          mount "$PART" /tmp/kairos-patch-state 2>/dev/null || continue
          [ -f "/tmp/kairos-patch-state/$IMG" ] || { umount /tmp/kairos-patch-state; continue; }
          IMG_LOOP=$(losetup -f --show "/tmp/kairos-patch-state/$IMG")
          mount "$IMG_LOOP" /tmp/kairos-patch-img 2>/dev/null || { losetup -d "$IMG_LOOP"; umount /tmp/kairos-patch-state; continue; }
          if [ -f /tmp/kairos-patch-img/etc/cos/bootargs.cfg ]; then
            sed -i 's/net.ifnames=1/net.ifnames=0 biosdevname=0/' /tmp/kairos-patch-img/etc/cos/bootargs.cfg
            echo "Patched bootargs in $IMG"
          fi
          if [ -d /tmp/kairos-patch-img/etc/network/interfaces.d ] && [ ! -f /tmp/kairos-patch-img/etc/network/interfaces.d/ifcfg-eth0 ]; then
            printf 'auto eth0\niface eth0 inet dhcp\n' > /tmp/kairos-patch-img/etc/network/interfaces.d/ifcfg-eth0
            echo "Added ifcfg-eth0 in $IMG"
          fi
          umount /tmp/kairos-patch-img
          losetup -d "$IMG_LOOP"
          umount /tmp/kairos-patch-state
        done
        losetup -d "$LOOP"
        rmdir /tmp/kairos-patch-state /tmp/kairos-patch-img 2>/dev/null || true
      become: true

    - name: Set GRUB timeout for unattended boot
      ansible.builtin.shell: |
        LOOP=$(losetup -fP --show {{ build_dir }}/kairos-disk.raw)
        mkdir -p /tmp/kairos-patch-grub
        # Partition 1 is the BIOS boot/grub partition
        for p in ${LOOP}p1 ${LOOP}p2; do
          mount "$p" /tmp/kairos-patch-grub 2>/dev/null || continue
          if [ -f /tmp/kairos-patch-grub/grub2/grub.cfg ]; then
            sed -i 's/^set timeout=.*/set timeout=5/' /tmp/kairos-patch-grub/grub2/grub.cfg
            grep -q "^set timeout=" /tmp/kairos-patch-grub/grub2/grub.cfg || \
              sed -i '1i set timeout=5' /tmp/kairos-patch-grub/grub2/grub.cfg
            echo "Patched grub timeout in $p (grub2/grub.cfg)"
          fi
          if [ -f /tmp/kairos-patch-grub/grub/grub.cfg ]; then
            sed -i 's/^set timeout=.*/set timeout=5/' /tmp/kairos-patch-grub/grub/grub.cfg
            grep -q "^set timeout=" /tmp/kairos-patch-grub/grub/grub.cfg || \
              sed -i '1i set timeout=5' /tmp/kairos-patch-grub/grub/grub.cfg
            echo "Patched grub timeout in $p (grub/grub.cfg)"
          fi
          umount /tmp/kairos-patch-grub
        done
        losetup -d "$LOOP"
        rmdir /tmp/kairos-patch-grub 2>/dev/null || true
      become: true

    - name: Trim sparse zeros
      ansible.builtin.shell: fallocate --dig-holes {{ build_dir }}/kairos-disk.raw
      failed_when: false

    - name: Generate checksum
      ansible.builtin.shell: |
        cd {{ build_dir }}
        sha256sum kairos-disk.raw > kairos-disk.raw.sha256

- name: Restore ownership of build artifacts to invoking user
  ansible.builtin.file:
    path: "{{ build_dir }}"
    state: directory
    owner: "{{ invoking_user.stdout }}"
    group: "{{ invoking_user.stdout }}"
    recurse: true
  become: true
