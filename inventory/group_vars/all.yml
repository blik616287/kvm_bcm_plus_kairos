# --- BCM Head Node ---
bcm_password: "rog8thriller3surge2risks"
bcm_hostname: "bcm11-headnode"
bcm_timezone: "America/Los_Angeles"

# BCM networking (internal provisioning network as seen from compute nodes)
bcm_internal_ip: "192.168.98.2"
bcm_internal_netmask: "24"
bcm_internal_cidr: "192.168.98.0/24"   # fallback only — deploy-dd discovers this from BCM at runtime

# BCM external gateway + DNS.
# bcm_manage_dns: when true, deploy-dd rewrites BCM's cmsh "nameservers" to bcm_external_dns.
# Leave false on existing BCMs with working site DNS.
bcm_manage_dns: false
bcm_external_gateway: "192.168.98.1"
bcm_external_dns: "1.1.1.1"

# SSH transport to BCM.
# Local-VM mode: bcm_ssh_host=localhost, bcm_ssh_port=10022, proxy vars empty.
# Remote mode:   bcm_ssh_host=<bcm_ip>, bcm_ssh_port=22, proxy vars set.
bcm_ssh_host: "192.168.98.2"
bcm_ssh_port: 22
bcm_ssh_proxy_jump: "partner@100.90.255.42"
bcm_ssh_proxy_key: "~/.ssh/sai"
bcm_https_port: 10443

# BCM VM resources
bcm_vm_ram: 8192
bcm_vm_cpus: 4
bcm_vm_disk_size: "100G"

# --- Target compute node (existing BCM device) ---
# For local-KVM deploys: leave defaults (bcm_target_node unset → falls back to node001 flow).
# For remote deploys: set bcm_target_node to an existing cmsh device name.
bcm_source_category: "S-AI Partner Lab"
bcm_manage_cluster_defaults: false
bcm_target_node: "edge-4c4c454400485610804bc3c04f4e4434"

# Kairos install target (on the compute node)
kairos_target_disk: "/dev/nvme0n1"
kairos_wipe_disks: "nvme1n1 nvme2n1 nvme3n1 nvme4n1"

# --- Kairos Compute Node VM (local-KVM mode only) ---
kairos_vm_mac: "52:54:00:00:02:01"
kairos_vm_ram: 4096
kairos_vm_cpus: 2
kairos_vm_disk_size: "80G"

